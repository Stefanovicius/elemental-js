name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release for tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -eu

          api_root="https://api.github.com/repos/${REPOSITORY}/releases"
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GITHUB_TOKEN}"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          if curl -fsSL "${headers[@]}" "${api_root}/tags/${TAG_NAME}" >/dev/null; then
            echo "Release for ${TAG_NAME} already exists."
            exit 0
          fi

          payload=$(printf '{"tag_name":"%s","name":"%s","generate_release_notes":true,"make_latest":"true"}' "$TAG_NAME" "$TAG_NAME")
          curl -fsSL -X POST "${headers[@]}" "${api_root}" -d "${payload}" >/dev/null
